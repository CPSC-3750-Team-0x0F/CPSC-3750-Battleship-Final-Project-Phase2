<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- LANDING VIEW -->
    <section id="landingView">
      <h1>Battleship Online</h1>
      <p class="subtitle">Create or join a game</p>

      <div class="card">
        <input id="username" type="text" placeholder="Enter Username" />
        <input id="gameId" type="number" placeholder="Enter Game ID (for join)" />

        <div class="buttons">
          <button onclick="createGame()">Create Game</button>
          <button onclick="joinGame()">Join Game</button>
          <button onclick="playBot()">Play Bot</button>
        </div>
      </div>

      <div id="status" class="status-text"></div>
    </section>

    <!-- GAME VIEW -->
    <section id="gameView" class="hidden">
      <div class="topbar">
        <div>
          <h1 class="game-title">Battleship Match</h1>
          <p id="gameStatusOnly" class="subtitle left-align">Waiting for game data...</p>
        </div>
        <button class="back-btn secondary-btn" onclick="goHome()">Back</button>
      </div>

      <div class="turn-strip">
        <div id="youTurnBadge" class="turn-badge">You</div>
        <div id="opponentTurnBadge" class="turn-badge">Opponent</div>
      </div>

      <div class="boards">
        <div class="board-panel">
          <h2 id="yourBoardLabel">Your Board</h2>
          <div id="playerBoard" class="board"></div>
        </div>

        <div class="board-panel">
          <h2 id="enemyBoardLabel">Opponent Board</h2>
          <div id="enemyBoard" class="board"></div>
        </div>
      </div>

      <div class="game-actions">
        <button id="placeShipsBtn" class="hidden" onclick="submitDefaultShips()">Place Ships</button>
        <button class="secondary-btn" onclick="refreshGameState()">Refresh Game</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>

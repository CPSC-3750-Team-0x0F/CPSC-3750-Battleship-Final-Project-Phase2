<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Battleship Online</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>Battleship Online</h1>
    <p class="subtitle">Create or join a game</p>

    <div class="card">
      
      <input 
        id="username" 
        type="text" 
        placeholder="Enter Username"
      />

      <input 
        id="gameId" 
        type="number" 
        placeholder="Enter Game ID (for join)"
      />

      <div class="buttons">
        <button onclick="createGame()">Create Game</button>
        <button onclick="joinGame()">Join Game</button>
        <button onclick="playBot()">Play Bot</button>
      </div>

    </div>

    <div id="status"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
